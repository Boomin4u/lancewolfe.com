<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f0f0f0; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; }
        h1 { color: #0066cc; }
        p { line-height: 1.6; }
        .button { display: inline-block; background: #0066cc; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
        .meme { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Page</h1>
        <p>This is a simple personal page to showcase my portfolio and projects.</p>
        <a href="#" class="button">View My Work</a>
        <div class="meme">
            <img id="memeImage" src="https://source.unsplash.com/random" alt="Random Meme">
        </div>
    </div> 

    <script>
        // Set the src attribute of the meme image
        var memeImage = document.getElementById("memeImage");
        memeImage.src = "https://source.unsplash.com/random";
    </script>
</body>
</html>
